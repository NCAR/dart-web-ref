# Site Params
[params]
  logo = "images/bam-crop.png"
  dateFormat = "26 FEB 1994"
  # Meta data
  description = "DART is a community facility for ensemble DA developed and maintained by the Data Assimilation Research Section (DAReS) at the National Center for Atmospheric Research (NCAR)."
  author = "DAReS"
  # Google Analitycs
  googleAnalitycsID = "Your ID"
  # We're using formspree.io for form handling, paste your formspree url below
  formspreeFormUrl  = "https://formspree.io/myykjpje"
  email = "dart.ucar.edu"
 
  # Navbar Action Button
  # not used currently
  [params.navAction]
    status  = true
    name    = "Get in touch"
    url     = "contact"
  

  # Banner Section
  [params.banner]
    enable                = true
    background_image      = "images/backgrounds/NCAR-Waves.png"
    heading               = "The Data Assimilation Research Testbed"
    tagline               = "a community facility for ensemble data assimilation"
    primary_button        = "Research"
    primary_button_url    = "research"
    secondary_button      = "Contact Us"
    secondary_button_url  = "contact"
    animation             = "images/lorenz.mp4"

  [params.research]
    enable               = true
    title                = "RECENT PROJECTS"
    subtitle             = "Research projects involving DART"
    primary_button       = "Publications"
    primary_button_url   = "publications"
    secondary_button     = "Presentations" 
    secondary_button_url = "presentations"

  [params.tutorial]
    background_image      = "images/backgrounds/NCAR-Waves.png"

  [params.call_to_action]
    enable              = false
    background_image    = "images/backgrounds/cta-background.jpg"
    title               = "LET’S WORK TOGETHER"
    primary_button      = "Submit Query"
    primary_button_url  = "contact"
    secondary_button    = "Not Convinced"
    secondary_button_url = "research"

  [params.collab]
    enable           = false
    heading          = "Interested? <span>Collaborate</span> with us."
    background_image = "images/backgrounds/NCAR-Waves.png"

  [params.footer]
    # Footer Contact Info
    [params.footer.contactInfo]
      title   = "Contact Info"
      address = "1850 Table Mesa Dr.<br>Boulder, CO 80305"
      #phone  = "409-896-1444"
      email   = "dart@ucar.edu"
      # Footer Sitemap
      [params.footer.sitemap]
        title  = "Sitemap"
        [[params.footer.sitemap.link]]
          name = "About Us"
          url  = "about"
        [[params.footer.sitemap.link]]
          name = "Research"
