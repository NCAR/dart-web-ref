        [[params.footer.sitemap.link]]
          name = "Tutorials"
          url  = "tutorials"
        [[params.footer.sitemap.link]]
          name = "Contact"
          url  = "contact"
      # Footer Research
      [params.footer.research]
        title  = "Research"
        [[params.footer.research.link]]
          name = "Featured Projects"
          url  = "research"
        [[params.footer.research.link]]
          name = "Publications"
          url  = "publications"
        [[params.footer.research.link]]
          name = "Presentations"
          url  = "presentations"
      # Footer Social Media
