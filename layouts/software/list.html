{{ define "main" }}

<section class="site-software-header">
  <div class="container" >
    <div class="row justify-content-right">
      <div class="col-lg-12 text-center">
        <h1>{{ .Title }}</h1>
        <h6> {{ .Params.tagline }} </h6>
      </div>
    </div>
  </div>
</section>

<section class="site-software-content">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      {{ .Content  | safeHTML }}
    </div>
  </div>
</section>


<section class="site-software-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-9">
        <div class="site-software-wrapper">
          <div class="site-software-git">
             <center>
              <a target="_blank" href="{{ .Params.github | absURL }}">
              <h1>
              Get Dart <i class="fa fa-github"></i>
              </h1>
              </a>
             </center>
          </div>
     <div class="site-software-spacer">
     </div>
          <div class="site-software-docs">
             <center>
              <a target="_blank" href="{{ .Params.readthedocs | absURL }}">
              <h1>
              Read the docs <span class="icon-data-assimilation"></span>
              </h1>
              </a>
             </center>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

{{ partial "get_help.html" . }}

{{ partial "clients.html" . }}

{{ end }}
